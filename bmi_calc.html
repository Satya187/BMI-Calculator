<!doctype html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>BMI Calculator</title>
	
    <link rel="stylesheet" href="https://unpkg.com/purecss@0.6.2/build/pure-min.css" integrity="sha384-UQiGfs9ICog+LwheBSRCt1o5cbyKIHbwjWscjemyBMT9YCUMZffs6UqUTd0hObXD" crossorigin="anonymous">

	<style>
		.main {
			padding-left: 100px;
			padding-right: 100px;
			text-align: left;
		}
		
		h1 {
			text-align: center;
		}
		
		.centered-text {
			text-align: center;
		}
		
		th, td , table {
			width: 20%;
			border: 1px solid black;
			border-collapse: collapse;
		}
		
		tr:nth-child(even) {
			background-color: #f7e1e1;
		}
		
		
		.border {
			border: 1px solid rgb(0, 0, 0);
			border-collapse: collapse;
		}
		.image{
			padding-right: 30px;
			padding-left: 30px
		}
	</style>

</head>

<h1 class="hello">Body Mass Index Calculator</h1>

<body>

<img class="image" src="https://www.fitterfly.com/blog/wp-content/uploads/2023/02/Understanding-Your-BMI-A-Guide-to-Reading-a-BMI-Chart.jpg" width="1350" height="450">

<div class="main">
	<form class="pure-form" method="POST" action="/">
	Weight in kgs:<br>
	<input type="text" name="weight"><br>
	Height in cms:<br>
	<input type="text" name="height"><br>
	<button type="Calculate" class="pure-button pure-button-primary" value="Calculate">Calculate</button>
	</form>
</div>

<br>

<div class="main">
	{% if bmi %}
	    <p>
        {% print("Your BMI is {}.".format(bmi)) %}
        </p>
	{% endif %}
</div>

</body>
</html>
